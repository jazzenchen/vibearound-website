<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1440" viewBox="0 0 1440 1440">
  <rect width="1440" height="1440" fill="#f7f5f0"/>

  <defs>
    <style>
      .cell { fill: #fffdf8; stroke: #e8e3d8; stroke-width: 1; }
      .label { font: 500 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #a7a097; letter-spacing: 0; }
      .black { stroke: #101010; }
      .gray { stroke: #dad9d4; }
      .soft { stroke: #ece9e3; }
      .orange { stroke: #f28a20; }
      .green { stroke: #65e38f; }
      .ink { stroke: #17231d; }
      .mark {
        fill: none;
        stroke-linecap: butt;
        stroke-linejoin: miter;
      }
    </style>
  </defs>

  <!-- 01: reference, optically balanced -->
  <g transform="translate(180 340)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark gray" stroke-width="28" d="M -70 72 L 0 -94 L 70 72"/>
    <path class="mark black" stroke-width="34" d="M -56 -48 L 0 86 L 56 -48"/>
    <text class="label" x="-11" y="158">01</text>
  </g>

  <!-- 02: taller A, shorter V -->
  <g transform="translate(540 340)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark soft" stroke-width="34" d="M -78 82 L 0 -98 L 78 82"/>
    <path class="mark black" stroke-width="38" d="M -56 -38 L 0 82 L 56 -38"/>
    <text class="label" x="-12" y="158">02</text>
  </g>

  <!-- 03: shared-stroke feeling -->
  <g transform="translate(900 340)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark gray" stroke-width="28" d="M -74 80 L 0 -88 L 74 80"/>
    <path class="mark black" stroke-width="34" d="M -62 -54 L 0 86 L 62 -54"/>
    <path class="mark black" stroke-width="16" d="M -20 39 L 20 39"/>
    <text class="label" x="-12" y="158">03</text>
  </g>

  <!-- 04: color contrast but same simple construction -->
  <g transform="translate(1260 340)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark gray" stroke-width="28" d="M -72 76 L 0 -90 L 72 76"/>
    <path class="mark black" stroke-width="36" d="M -58 -48 L 0 86"/>
    <path class="mark orange" stroke-width="36" d="M 0 86 L 58 -48"/>
    <text class="label" x="-12" y="158">04</text>
  </g>

  <!-- 05: reversed tile -->
  <g transform="translate(180 990)">
    <rect x="-130" y="-130" width="260" height="260" rx="56" fill="#101010"/>
    <path class="mark" stroke="#343434" stroke-width="30" d="M -72 76 L 0 -88 L 72 76"/>
    <path class="mark" stroke="#fffaf0" stroke-width="38" d="M -58 -46 L 0 84 L 58 -46"/>
    <text class="label" x="-12" y="158">05</text>
  </g>

  <!-- 06: dark green app tile -->
  <g transform="translate(540 990)">
    <rect x="-130" y="-130" width="260" height="260" rx="56" fill="#18231d"/>
    <path class="mark" stroke="#2d3f35" stroke-width="30" d="M -72 76 L 0 -88 L 72 76"/>
    <path class="mark" stroke="#f8f5eb" stroke-width="38" d="M -58 -46 L 0 84 L 58 -46"/>
    <path class="mark" stroke="#65e38f" stroke-width="16" d="M -22 42 L 22 42"/>
    <text class="label" x="-12" y="158">06</text>
  </g>

  <!-- 07: lighter, icon-friendly stencil -->
  <g transform="translate(900 990)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark soft" stroke-width="32" d="M -76 80 L 0 -86 L 76 80"/>
    <path class="mark black" stroke-width="34" d="M -58 -48 L 0 82 L 58 -48"/>
    <path class="mark" stroke="#f7f5f0" stroke-width="16" d="M -13 35 L 13 35"/>
    <text class="label" x="-12" y="158">07</text>
  </g>

  <!-- 08: bolder, nearly single-color -->
  <g transform="translate(1260 990)">
    <rect class="cell" x="-130" y="-130" width="260" height="260" rx="40"/>
    <path class="mark gray" stroke-width="36" d="M -78 82 L 0 -92 L 78 82"/>
    <path class="mark black" stroke-width="42" d="M -62 -50 L 0 88 L 62 -50"/>
    <text class="label" x="-12" y="158">08</text>
  </g>
</svg>
